<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de QR | CES Ramón y Cajal — Córdoba</title>
  <meta name="description"
    content="Genera códigos QR personalizados con el logo del CES Ramón y Cajal de Córdoba. Introduce un enlace y descarga tu QR al instante." />
  <meta name="theme-color" content="#1B2A6B" />

  <!-- Favicon (logo) -->
  <link rel="icon" type="image/png" href="assets/image.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ====== HEADER ====== -->
  <header class="header" role="banner">
    <div class="header__inner">
      <img src="assets/image.png" alt="Logo CES Ramón y Cajal" class="header__logo" />
      <h1 class="sr-only">CES Ramón y Cajal</h1>
      <span class="header__subtitle">Generador de Códigos QR</span>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <main class="main" role="main">
    <section class="card" aria-label="Generador de QR">
      <h2 class="card__title">Genera tu código QR</h2>
      <p class="card__description">
        Introduce un enlace y obtén un código QR con el logo del centro, listo para descargar.
      </p>

      <!-- Form -->
      <form class="form" id="qr-form" autocomplete="off">
        <label class="form__label" for="url-input">Enlace</label>
        <div class="form__input-wrap">
          <span class="form__input-icon" aria-hidden="true">
            <!-- Link icon SVG -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
          </span>
          <input type="url" id="url-input" class="form__input" placeholder="https://ejemplo.com"
            aria-describedby="error-msg" required />
        </div>

        <!-- Error message -->
        <p class="form__error" id="error-msg" role="alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
          </svg>
          <span></span>
        </p>

        <button type="submit" class="form__btn" id="btn-generate">
          Generar QR
        </button>
      </form>

      <!-- Divider -->
      <div class="divider" id="divider"></div>

      <!-- QR Result -->
      <div class="qr-result" id="qr-result" aria-live="polite">
        <h3 class="qr-result__title">Tu código QR</h3>

        <div class="qr-result__preview">
          <div class="qr-result__canvas-wrap" id="canvas-wrap"></div>
          <p class="qr-result__url" id="url-display"></p>
        </div>

        <button type="button" class="btn-download" id="btn-download">
          <svg viewBox="0 0 24 24">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
          </svg>
          Descargar QR
        </button>
      </div>
    </section>
  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="footer" role="contentinfo">
    <img src="assets/image.png" alt="Logo CES Ramón y Cajal" class="footer__logo" />
    <p class="footer__text">
      &copy; 2026 <a href="#">CES Ramón y Cajal</a> — Córdoba
    </p>
  </footer>

  <!-- ====== Scripts ====== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
